{% extends "base.html" %}
{% block title %} Treatment Plan Creator Screen {% endblock %}
{% block content %}

       <div class="flex flex-col min-h-screen" id="Session note Screen">

       <div class="flex flex-row flex-grow">

          <aside class="w-64 p-4 bg-gray-200 hidden sm:block">
             <p> IDK </p>
             <p> treatmen plan stuff??? </p>
          </aside>

           <main class="flex-grow p-4">
            <div>
                 <form
                     hx-post="/post_tp"
                     hx-swap="innerHTML"
                     class="max-w-md m-2 p-2 rounded-sm border border-black"
                 >
                  <input
                     type="numbers"
                     id="clients ID"
                     name="client"
                     min="0"
                     class="max-w-md m-2 p-2 rounded-sm border border-black"
                  
                  /> Client Id
                  <input
                     type="numbers"
                     id="authors ID"
                     min="0"
                     name="author"
                     class="max-w-md m-2 p-2 rounded-sm border border-black"
                  /> Author Id
                  <button
                     type="submit"
                     class="rounded-md bg-indigo-600 px-2.5 py-1.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600"
                  > Submit Plan
                  </button>
                 </form>
                 <form
                     hx-post ="/create_goal"
                     hx-swap="innerHtml"
                     class="max-w-md m-2 p-2 rounded-sm border border-black"
                     hx-push-url="true"
                  >               
                  <label
                     for="goal_numbers"
                     class="block text-sm leading-6 font-medium text-neutral-900">Goal numbers?</label
                  >
                  <div class="mt-2 inline-flex flex-row space-x-2">
                  <input
                     type="number"
                     id="goal_numbers"
                     name="goal_numbers"
                     min="1"
                     max="20"
                     class="max-w-md rounded-sm border border-black"
                  />
                  <button
                     type="submit"
                     class="rounded-md bg-indigo-600 px-2.5 py-1.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600"
                  > create goals
                  </button>
               </form>
         </div>
      <div id="goals" />
           </main>
       </div>

       <footer class="bg-gray-300 p-4">
            what to put here?
       </footer>
     </div>


{% endblock %}
