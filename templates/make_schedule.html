<p class="text-fg4"> Schedule Technician Appointment </p>
<form
  hx-post="/post_tech_schedule"
  hx-swap="innerHTML"
  class="max-w-md"
>
  <input type="hidden" name="csrf_token" value = "{{ csrf_token }}">
  <label for="co_id" class="text-fg4"> Consultant ID: </label>
  <input type="number" id="co_id" name="co_id"
    class="text-form" required>
    <br>
  <label for="cl_id" class="text-fg4"> Client ID: </label>
  <input type="number" id="cl_id" name="cl_id"
    class="text-form" required>
    <br>
  <label for="te_id" class="text-fg4"> Tech ID: </label>
  <input type="number" id="te_id" name="te_id"
    class="text-form" required>
    <br>
  <label for="appt_date" class="text-fg4"> Appt Date: </label>
  <input type="date" id="appt_date" id="appt_date" name="appt_date"
    class="text-form" required>
    <br>
  <label for="appt_time" class="text-fg4"> Appt Start: </label>
  <input type="time" id="appt_time" id="appt_time" name="appt_time"
    class="text-form" required>
    <br>
  <button
      type="submit"
     class="aqua-button"
  >
      Submit
  </button>
</form>
<br>
